apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k1c-hello.workerRefName" . }}
  annotations:
    cloudflare.com/compatibility-date: {{ .Values.worker.compatibilityDate | quote }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: {{ include "k1c-hello.workerRefName" . }}
  template:
    spec:
      containers:
        - name: {{ include "k1c-hello.workerRefName" . }}
          image: {{ .Values.worker.image }}
          env:
            - name: GREETING
              valueFrom:
                configMapKeyRef:
                  name: {{ include "k1c-hello.workerRefName" . }}-config
                  key: GREETING
            - name: REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "k1c-hello.workerRefName" . }}-config
                  key: REGION
          volumeMounts:
{{- if .Values.bucket.enabled }}
            - name: r2-media
              mountPath: /mnt/r2-media
{{- end }}
{{- if .Values.kv.enabled }}
            - name: kv-cache
              mountPath: /mnt/kv-cache
{{- end }}
      volumes:
{{- if .Values.bucket.enabled }}
        - name: r2-media
          csi:
            driver: r2.k1c.io
            volumeAttributes:
              bucketRef: {{ .Values.bucket.name }}
{{- end }}
{{- if .Values.kv.enabled }}
        - name: kv-cache
          csi:
            driver: kv.k1c.io
            volumeAttributes:
              namespaceRef: {{ .Values.kv.name }}
{{- end }}
