# k1c-operator helm values.

# Override the release namespace; left as `k1c-system` to match the
# install.yaml bundle. Set to "" to use the namespace from
# `--namespace` on the install command.
namespace: k1c-system
# Create the namespace as part of the release (so `helm install` is
# self-contained). Set false if your CD pipeline manages namespaces.
createNamespace: true

image:
  repository: ghcr.io/mizchi/k1c-operator
  # Empty = use Chart.appVersion. Override for pinning.
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

replicaCount: 1

# Cloudflare credentials. The Secret is created by you (out of band)
# and referenced by name. Required keys: K1C_ACCOUNT_ID and
# CLOUDFLARE_API_TOKEN.
cloudflareSecretName: cloudflare-api-token

# Operator runtime args.
operator:
  intervalSec: 30
  watch: true
  leaderElection: true
  leaseName: k1c-operator
  # leaseNamespace defaults to the release namespace.
  leaseNamespace: ""
  metricsAddr: "0.0.0.0:9090"
  # If set, restrict the operator to this single namespace. Empty
  # means cluster-wide (default).
  restrictNamespace: ""
  # Log format: `text` (default, human-readable) or `json` (structured
  # one-object-per-line for log aggregators).
  logFormat: text

# Probe + listener port for /metrics, /healthz, /readyz.
metricsPort: 9090
metricsService:
  enabled: true
  type: ClusterIP

# ServiceMonitor for kube-prometheus / prometheus-operator. Only
# rendered if your cluster has the `monitoring.coreos.com` group
# registered. Off by default so plain installs don't ship dangling
# resources.
serviceMonitor:
  enabled: false
  # Empty = uses release namespace; some kube-prometheus deploys
  # require a specific monitoring namespace.
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  # Extra labels for the Prometheus operator's `serviceMonitorSelector`
  # (commonly `release: kube-prometheus`).
  additionalLabels: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# PodDisruptionBudget — only applied when replicaCount > 1, so
# single-replica installs aren't blocked by node drains. Set
# `minAvailable` for an absolute floor or leave it unset to use
# `maxUnavailable: 1` (allow one pod to be evicted at a time, which
# matches the leader+standby pattern).
podDisruptionBudget:
  enabled: true
  minAvailable: ""
  maxUnavailable: 1

# Standard k8s scheduling knobs.
nodeSelector: {}
tolerations: []
affinity: {}
# Spread constraints — only meaningful when replicaCount > 1. The
# default (skew=1 across hostnames) keeps the leader and standby on
# different nodes so a single node failure can't take both down.
# Set to [] to disable.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
podAnnotations: {}
podLabels: {}

# When true, the chart also emits all 21 Cloudflare CRDs. Off by
# default — keep CRDs out of the helm release lifecycle so a
# `helm uninstall` doesn't delete them and orphan every CR.
installCrds: false
