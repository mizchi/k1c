apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-k1c-operator
  labels:
    {{- include "k1c-operator.labels" . | nindent 4 }}
rules:
  # Watch + read every standard kind we may pick up via the managed label.
  - apiGroups: [""]
    resources: [configmaps, secrets, services, namespaces]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: ["networking.k8s.io"]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: ["argoproj.io"]
    resources: [rollouts]
    verbs: [get, list, watch]
  # Cloudflare CRDs (cluster-wide). The /status subresource is a
  # separate verb path, hence the explicit `*/status` rule.
  - apiGroups: ["cloudflare.k1c.io"]
    resources: ["*"]
    verbs: [get, list, watch, update, patch]
  - apiGroups: ["cloudflare.k1c.io"]
    resources: ["*/status"]
    verbs: [get, update, patch]
  # Leader election.
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-k1c-operator
  labels:
    {{- include "k1c-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-k1c-operator
subjects:
  - kind: ServiceAccount
    name: k1c-operator
    namespace: {{ include "k1c-operator.namespace" . }}
