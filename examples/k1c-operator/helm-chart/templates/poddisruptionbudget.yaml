{{- if and (gt (int .Values.replicaCount) 1) .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: k1c-operator
  namespace: {{ include "k1c-operator.namespace" . }}
  labels:
    {{- include "k1c-operator.labels" . | nindent 4 }}
spec:
  {{- if .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- else }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "k1c-operator.selectorLabels" . | nindent 6 }}
{{- end }}
