{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: k1c-operator
  namespace: {{ default (include "k1c-operator.namespace" .) .Values.serviceMonitor.namespace }}
  labels:
    {{- include "k1c-operator.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "k1c-operator.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ include "k1c-operator.namespace" . }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end }}
