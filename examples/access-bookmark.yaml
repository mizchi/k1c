# Cloudflare Access App Launcher tile (bookmark). Bookmarks have no policies —
# they are just visual tiles in the App Launcher dashboard that link out to a
# URL. Useful for surfacing internal SaaS tools alongside k1c-gated apps.
#
# Apply with: K1C_ACCOUNT_ID=... CLOUDFLARE_API_TOKEN=... pnpm k1c apply -f examples/access-bookmark.yaml --dry-run

apiVersion: cloudflare.k1c.io/v1alpha1
kind: AccessApplication
metadata:
  name: notion
spec:
  type: bookmark
  domain: https://www.notion.so/anthropic
  logoUrl: https://www.notion.so/favicon.ico
  appLauncherVisible: true
