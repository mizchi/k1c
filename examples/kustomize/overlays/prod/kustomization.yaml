apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: prod

# Drop a second R2 bucket for prod-only assets, on top of the base bucket.
resources:
  - ../../base
  - extra-bucket.yaml

# Override the Deployment annotation for the prod compatibility date.
patches:
  - target:
      kind: Deployment
      name: hello
    patch: |-
      - op: replace
        path: /metadata/annotations/cloudflare.com~1compatibility-date
        value: "2025-12-01"
