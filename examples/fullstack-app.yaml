# Full-stack example: a single web Worker backed by R2 (assets), KV
# (sessions), D1 (relational data) and exposed at https://app.example.com
# with a managed CNAME and a Custom Domain.
#
# Apply with: pnpm k1c apply -f examples/fullstack-app.yaml --dry-run

apiVersion: cloudflare.k1c.io/v1alpha1
kind: R2Bucket
metadata: { name: assets }
spec: { location: weur }
---
apiVersion: cloudflare.k1c.io/v1alpha1
kind: KVNamespace
metadata: { name: sessions }
spec: {}
---
apiVersion: cloudflare.k1c.io/v1alpha1
kind: D1Database
metadata: { name: app }
spec:
  primaryLocationHint: weur
---
apiVersion: v1
kind: ConfigMap
metadata: { name: app-config }
data:
  REGION: weur
  FEATURE_BETA: "true"
---
apiVersion: v1
kind: Secret
metadata: { name: app-secrets }
stringData:
  STRIPE_KEY: REPLACE_WITH_STRIPE_KEY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  annotations:
    cloudflare.com/compatibility-date: "2025-09-01"
    cloudflare.com/observability: enabled
    cloudflare.com/smart-placement: smart
spec:
  selector:
    matchLabels:
      app: web
  template:
    spec:
      containers:
        - name: web
          image: ./examples/hello-worker.mjs
          env:
            - name: REGION
              valueFrom: { configMapKeyRef: { name: app-config, key: REGION } }
            - name: FEATURE_BETA
              valueFrom: { configMapKeyRef: { name: app-config, key: FEATURE_BETA } }
            - name: STRIPE_KEY
              valueFrom: { secretKeyRef: { name: app-secrets, key: STRIPE_KEY } }
          volumeMounts:
            - { name: assets, mountPath: /mnt/assets }
            - { name: sessions, mountPath: /mnt/sessions }
            - { name: db, mountPath: /mnt/db }
      volumes:
        - name: assets
          csi:
            driver: r2.k1c.io
            volumeAttributes: { bucketRef: assets }
        - name: sessions
          csi:
            driver: kv.k1c.io
            volumeAttributes: { namespaceRef: sessions }
        - name: db
          csi:
            driver: d1.k1c.io
            volumeAttributes: { ref: app }
---
apiVersion: v1
kind: Service
metadata:
  name: web
  annotations:
    cloudflare.com/zone-id: REPLACE_WITH_YOUR_ZONE_ID
    cloudflare.com/hostname: app.example.com
    cloudflare.com/manage-dns: "true"
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
    - { port: 443 }
