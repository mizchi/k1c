# Cloudflare Load Balancer example.
#
# Monitor → Pool → LoadBalancer dependency chain. zoneId is required on
# the LB itself (LB is zone-scoped). Pool ids are auto-resolved via the
# `<resolved-at-apply:LoadBalancerPool:ns/name>` placeholder once create
# returns.
---
apiVersion: cloudflare.k1c.io/v1alpha1
kind: LoadBalancerMonitor
metadata:
  name: api-https
  namespace: default
spec:
  type: https
  path: /healthz
  expectedCodes: "200"
  interval: 30
  timeout: 5
  retries: 2
  followRedirects: true
---
apiVersion: cloudflare.k1c.io/v1alpha1
kind: LoadBalancerPool
metadata:
  name: api-primary
  namespace: default
spec:
  origins:
    - address: edge-1.example.com
      name: edge-1
      weight: 1
    - address: edge-2.example.com
      name: edge-2
      weight: 1
  monitor: "<resolved-at-apply:LoadBalancerMonitor:default/api-https>"
  minimumOrigins: 1
---
apiVersion: cloudflare.k1c.io/v1alpha1
kind: LoadBalancerPool
metadata:
  name: api-backup
  namespace: default
spec:
  origins:
    - address: backup.example.com
  monitor: "<resolved-at-apply:LoadBalancerMonitor:default/api-https>"
---
apiVersion: cloudflare.k1c.io/v1alpha1
kind: LoadBalancer
metadata:
  name: api
  namespace: default
spec:
  zoneId: "<resolved-at-apply:Context:zoneId>"
  name: api.example.com
  defaultPools:
    - "<resolved-at-apply:LoadBalancerPool:default/api-primary>"
  fallbackPool: "<resolved-at-apply:LoadBalancerPool:default/api-backup>"
  proxied: true
  steeringPolicy: dynamic_latency
  description: production API steering
