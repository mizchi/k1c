# Minimal k1c manifest: one Worker that talks to one R2 bucket and one KV namespace.
# Apply with: K1C_ACCOUNT_ID=... CLOUDFLARE_API_TOKEN=... pnpm k1c apply -f examples/hello-worker.yaml

apiVersion: cloudflare.k1c.io/v1alpha1
kind: R2Bucket
metadata:
  name: media
spec:
  location: weur
---
apiVersion: cloudflare.k1c.io/v1alpha1
kind: KVNamespace
metadata:
  name: cache
spec: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-config
data:
  GREETING: "hello, k1c"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  annotations:
    cloudflare.com/compatibility-date: "2025-09-01"
    cloudflare.com/observability: enabled
spec:
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: hello
          image: ./examples/hello-worker.mjs
          env:
            - name: REGION
              value: weur
            - name: GREETING
              valueFrom:
                configMapKeyRef:
                  name: hello-config
                  key: GREETING
          volumeMounts:
            - name: r2-media
              mountPath: /mnt/r2-media
            - name: kv-cache
              mountPath: /mnt/kv-cache
      volumes:
        - name: r2-media
          csi:
            driver: r2.k1c.io
            volumeAttributes:
              bucketRef: media
              binding: R2_MEDIA
        - name: kv-cache
          csi:
            driver: kv.k1c.io
            volumeAttributes:
              namespaceRef: cache
              binding: IMAGE_CACHE
