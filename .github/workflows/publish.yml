name: publish

on:
  release:
    types: [published]
  # Allow manual trigger for re-runs / hotfixes from the same tag.
  workflow_dispatch: {}

# Minimal permissions: read source, mint OIDC token for npm trusted publishing.
permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

      - name: build
        run: pnpm build

      # Publishes via OIDC trusted publishing — no NPM_TOKEN needed once the
      # repo is registered as a trusted publisher for @mizchi/k1c on npmjs.com.
      # `--provenance` uploads the SLSA attestation that ties the published
      # tarball to this exact workflow run.
      - name: publish
        run: npm publish --provenance --access public
