name: release-please

on:
  push:
    branches: [main]
  # Manual escape hatch for retries (needed once after enabling
  # "Allow GitHub Actions to create and approve pull requests" in repo settings).
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
