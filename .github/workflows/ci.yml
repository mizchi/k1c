name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Opt into the Node.js 24 runtime for JavaScript actions ahead of GitHub's
# 2026-06-02 default switch (silences the Node.js 20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: secretlint
        run: pnpm secretlint

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test
